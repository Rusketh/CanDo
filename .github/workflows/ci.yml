name: CI

on:
  push:
    branches: [ main, master, jules ]
  pull_request:
    branches: [ main, master, jules ]

jobs:
  # ---------------------------------------------------------------------------
  # Linux build + test
  # ---------------------------------------------------------------------------
  linux:
    name: Test & Build (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc make libssl-dev

      - name: Run tests
        run: make test

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: cando-linux-x86_64
          path: cando

  # ---------------------------------------------------------------------------
  # Windows build (MinGW-w64 via MSYS2, includes OpenSSL)
  # ---------------------------------------------------------------------------
  windows:
    name: Build (Windows)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-openssl

      - name: Build cando.exe
        run: make cando.exe MINGW_CC=gcc WINDRES=windres

      - name: Verify no MinGW runtime DLL deps
        run: |
          set -e
          echo "=== cando.exe imports ==="
          objdump -p cando.exe | grep "DLL Name" || true
          echo "=== libcando.dll imports ==="
          objdump -p libcando.dll | grep "DLL Name" || true
          for bin in cando.exe libcando.dll; do
            for dll in libwinpthread-1.dll libgcc_s_seh-1.dll libstdc++-6.dll libssl-3-x64.dll libcrypto-3-x64.dll; do
              if objdump -p "$bin" | grep -qi "DLL Name: $dll"; then
                echo "ERROR: $bin still imports $dll"
                exit 1
              fi
            done
          done
          echo "OK: no MinGW runtime DLL dependencies."

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: cando-windows-x86_64
          path: |
            cando.exe
            libcando.dll
