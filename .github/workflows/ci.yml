name: CI

on:
  push:
    branches: [ main, master, jules ]
  pull_request:
    branches: [ main, master, jules ]

jobs:
  # ---------------------------------------------------------------------------
  # Linux build + test
  # ---------------------------------------------------------------------------
  linux:
    name: Test & Build (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc make libssl-dev

      - name: Run tests
        run: make test

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: cando-linux-x86_64
          path: cando

  # ---------------------------------------------------------------------------
  # Windows build (MinGW-w64 via MSYS2, includes OpenSSL)
  # ---------------------------------------------------------------------------
  windows:
    name: Build (Windows)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-openssl

      - name: Build cando.exe
        run: make cando.exe MINGW_CC=gcc WINDRES=windres

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: cando-windows-x86_64
          path: |
            cando.exe
            libcando.dll
